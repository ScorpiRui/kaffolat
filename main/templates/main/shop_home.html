{% extends "main/base.html" %}

{% block title %}Skaner{% endblock %}

{% block header_right %}
{% endblock %}

{% block content %}

<style>
html.scanner-page, .scanner-page body {
    overflow: hidden !important;
    position: fixed !important;
    width: 100% !important;
    height: 100% !important;
    touch-action: none;
}
@keyframes qr-pulse {
    0%, 100% { opacity: 0.6; }
    50%      { opacity: 1; }
}
.qr-pulse {
    animation: qr-pulse 2s ease-in-out infinite;
}
</style>

<script>document.documentElement.classList.add('scanner-page');</script>
<div id="normalView" class="flex flex-col items-center justify-center" style="height: calc(100vh - 170px); overflow:hidden;">

    <div class="flex flex-col items-center" style="margin-bottom:100px;">
    <!-- Static viewfinder -->
    <div class="relative" style="margin-bottom:20px; width:270px; height:270px;">
        <div class="absolute inset-0 rounded-2xl"></div>
        <div class="absolute top-0 left-0 w-20 h-20"
             style="border-top:8px solid #ffffff;border-left:8px solid #ffffff;border-radius:34px 0 0 0;"></div>
        <div class="absolute top-0 right-0 w-20 h-20"
             style="border-top:8px solid #ffffff;border-right:8px solid #ffffff;border-radius:0 34px 0 0;"></div>
        <div class="absolute bottom-0 left-0 w-20 h-20"
             style="border-bottom:8px solid #ffffff;border-left:8px solid #ffffff;border-radius:0 0 0 34px;"></div>
        <div class="absolute bottom-0 right-0 w-20 h-20"
             style="border-bottom:8px solid #ffffff;border-right:8px solid #ffffff;border-radius:0 0 34px 0;"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <button id="scanBtn"
                    class="text-white font-semibold rounded-full px-7 py-3
                           text-sm  active:bg-black">
                <span id="scanBtnLabel">QR kodni skanerlash</span>
            </button>
        </div>
    </div>

    <!-- Mode toggle: Kafolat / Ta'mirlash (below viewfinder — UX flow) -->
    <div class="flex bg-gray-200 rounded-xl p-1 mt-5 mb-5" style="width:260px; margin-bottom:30px;">
        <button type="button" id="modeWarranty"
                class="flex-1 py-2 rounded-lg text-sm font-semibold bg-gray-900 text-white shadow">
            Kafolat
        </button>
        <button type="button" id="modeRepair"
                class="flex-1 py-2 rounded-lg text-sm font-semibold text-gray-400">
            Ta'mirlash
        </button>
    </div>

    </div>

</div>

<!-- Full-screen camera overlay -->
<div id="cameraOverlay"
     class="hidden fixed inset-0 z-50"
     style="background:#000;">

    <video id="video" autoplay playsinline muted
           class="absolute inset-0 w-full h-full object-cover"></video>
    <canvas id="canvas" class="hidden"></canvas>

    <!-- Dark vignette -->
    <div class="absolute inset-0 pointer-events-none"
         style="background: radial-gradient(ellipse 60% 50% at 50% 46%,
                transparent 0%, rgba(0,0,0,0.58) 100%);">
    </div>

    <!-- QR frame -->
    <div id="qrFrame"
         class="absolute inset-0 flex items-center justify-center pointer-events-none"
         style="padding-bottom:80px; transform:translateY(-30px);">
        <div class="relative" style="width:270px;height:270px;">
            <div class="absolute top-0 left-0 w-20 h-20"
                 style="border-top:4px solid #fff;border-left:4px solid #fff;border-radius:20px 0 0 0;"></div>
            <div class="absolute top-0 right-0 w-20 h-20"
                 style="border-top:4px solid #fff;border-right:4px solid #fff;border-radius:0 20px 0 0;"></div>
            <div class="absolute bottom-0 left-0 w-20 h-20"
                 style="border-bottom:4px solid #fff;border-left:4px solid #fff;border-radius:0 0 0 20px;"></div>
            <div class="absolute bottom-0 right-0 w-20 h-20"
                 style="border-bottom:4px solid #fff;border-right:4px solid #fff;border-radius:0 0 20px 0;"></div>
        </div>
    </div>

    <!-- Mode indicator pill -->
    <div id="overlayModeLabel"
         class="absolute left-5 text-xs font-semibold text-white rounded-full px-3 py-1.5"
         style="top: calc(env(safe-area-inset-top, 0px) + 16px);
                left: calc(env(safe-area-inset-left, 0px) + 20px);
                background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);">
        Kafolat
    </div>

    <!-- Hint text -->
    <div id="hintText"
         class="absolute left-0 right-0 text-center text-white text-sm font-medium pointer-events-none"
         style="bottom: calc(50% - 210px);">
        QR kodni ramkaga yo'naltiring
    </div>

    <!-- Close button -->
    <button id="stopBtn"
            class="absolute right-5 bg-black bg-opacity-40 text-white
                   rounded-full p-3 active:bg-opacity-70"
            style="top: calc(env(safe-area-inset-top, 0px) + 16px);
                   right: calc(env(safe-area-inset-right, 0px) + 20px);
                   backdrop-filter:blur(4px);">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>

<!-- jsQR -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
(function () {
    var mode = 'warranty';
    var stream = null;
    var raf = null;

    var scanBtn        = document.getElementById('scanBtn');
    var stopBtn        = document.getElementById('stopBtn');
    var video          = document.getElementById('video');
    var canvas         = document.getElementById('canvas');
    var cameraOverlay  = document.getElementById('cameraOverlay');
    var modeWarrantyBtn = document.getElementById('modeWarranty');
    var modeRepairBtn   = document.getElementById('modeRepair');
    var overlayLabel    = document.getElementById('overlayModeLabel');

    function setMode(m) {
        mode = m;
        var isW = m === 'warranty';

        modeWarrantyBtn.classList.toggle('bg-gray-900', isW);
        modeWarrantyBtn.classList.toggle('text-white', isW);
        modeWarrantyBtn.classList.toggle('shadow', isW);
        modeWarrantyBtn.classList.toggle('text-gray-400', !isW);

        modeRepairBtn.classList.toggle('bg-gray-900', !isW);
        modeRepairBtn.classList.toggle('text-white', !isW);
        modeRepairBtn.classList.toggle('shadow', !isW);
        modeRepairBtn.classList.toggle('text-gray-400', isW);

        if (overlayLabel) {
            overlayLabel.textContent = isW ? "Kafolat" : "Ta'mirlash";
        }
    }

    function redirectToQr(code) {
        try {
            var url = new URL(code);
            var id = url.searchParams.get('id');
            if (id) code = id;
        } catch (_) {}
        var base = "{% url 'main:qr_handler' 'PLACEHOLDER' %}".replace('PLACEHOLDER', encodeURIComponent(code));
        window.location.href = base + '?mode=' + mode;
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
            if (code) { stopCamera(); redirectToQr(code.data); return; }
        }
        raf = requestAnimationFrame(tick);
    }

    function stopCamera() {
        if (raf) { cancelAnimationFrame(raf); raf = null; }
        if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
        cameraOverlay.classList.add('hidden');
        document.body.style.overflow = '';
    }

    function applyOverlaySafeArea() {
        var tg = window.Telegram && window.Telegram.WebApp;
        var top = ((tg && tg.safeAreaInset && tg.safeAreaInset.top) || 0)
                + ((tg && tg.contentSafeAreaInset && tg.contentSafeAreaInset.top) || 0)
                + 16;
        stopBtn.style.top = top + 'px';
        overlayLabel.style.top = top + 'px';
        stopBtn.style.right = (((tg && tg.safeAreaInset && tg.safeAreaInset.right) || 0) + 20) + 'px';
        overlayLabel.style.left = (((tg && tg.safeAreaInset && tg.safeAreaInset.left) || 0) + 20) + 'px';
    }

    async function startCamera() {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.showScanQrPopup) {
            Telegram.WebApp.showScanQrPopup({}, function (text) {
                Telegram.WebApp.closeScanQrPopup();
                redirectToQr(text);
            });
            return;
        }

        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                }
            });
            var track = stream.getVideoTracks()[0];
            if (track) {
                try {
                    var caps = track.getCapabilities ? track.getCapabilities() : {};
                    var modes = caps.focusMode || [];
                    if (modes.includes('continuous')) {
                        await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                    } else if (modes.includes('auto')) {
                        await track.applyConstraints({ advanced: [{ focusMode: 'auto' }] });
                    }
                } catch (_) {}
            }
            video.srcObject = stream;
            await video.play();
            cameraOverlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            applyOverlaySafeArea();
            raf = requestAnimationFrame(tick);
        } catch (_) {
            var inp = document.createElement('input');
            inp.type = 'file'; inp.accept = 'image/*'; inp.capture = 'environment';
            inp.onchange = async function (e) {
                var file = e.target.files[0]; if (!file) return;
                var bmp = await createImageBitmap(file);
                var off = new OffscreenCanvas(bmp.width, bmp.height);
                var ctx = off.getContext('2d'); ctx.drawImage(bmp, 0, 0);
                var img = ctx.getImageData(0, 0, bmp.width, bmp.height);
                var code = jsQR(img.data, img.width, img.height);
                if (code) redirectToQr(code.data);
                else alert("QR kod topilmadi.");
            };
            inp.click();
        }
    }

    (function () {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (tg) {
            tg.onEvent('safeAreaChanged', applyOverlaySafeArea);
            tg.onEvent('contentSafeAreaChanged', applyOverlaySafeArea);
        }
    })();

    modeWarrantyBtn.addEventListener('click', function () { setMode('warranty'); });
    modeRepairBtn.addEventListener('click', function () { setMode('repair'); });
    scanBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);
})();
</script>
{% endblock %}
