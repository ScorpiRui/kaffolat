<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Kaffolat{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        input, select, textarea { font-size: 16px !important; }
        body { background: #EEEDF4; }
        .pb-safe { padding-bottom: max(env(safe-area-inset-bottom), 8px); }
        .nav-item { transition: color 0.15s; }
        .nav-item:active { opacity: 0.7; }
        .nav-active-icon {
            background: #EEF2FF;
            border-radius: 16px;
            padding: 8px 16px;
        }
        .nav-bottom-icon {
            width: calc(2rem - 2px);
            height: calc(2rem - 2px);
        }
    </style>
</head>
<body class="text-gray-900 max-w-lg mx-auto min-h-screen">

<div class="min-h-screen flex flex-col">

    <!-- Floating header card (positioned below Telegram's top bar via safe area) -->
    <div id="topBar" class="pt-4 pb-2 sticky z-20" style="top:0; background:#EEEDF4; padding-left:20px; padding-right:20px;">
        <header class="bg-white shadow-sm flex items-center justify-center"
                style="width:100%; max-width:390px; height:70px; border-radius:113px; padding:0 16px; opacity:1;">
            <p class="font-bold text-gray-900 text-lg truncate leading-tight">
                {% if shop %}{{ shop.name }}{% else %}Kaffolat{% endif %}
            </p>
            {% block header_right %}{% endblock %}
        </header>
    </div>

    <!-- Page content: clear bottom nav (flush) + safe area -->
    <main class="flex-1 overflow-y-auto px-4 py-2" style="padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px) + 12px);">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom navigation (square, flush to bottom) -->
    <nav class="fixed z-20 bg-white pb-safe"
         style="bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:32rem; border-radius:0; box-shadow:0 -2px 12px rgba(0,0,0,0.08);">
        <div class="flex items-center justify-around px-2" style="min-height:80px;">

            <!-- Skaner -->
            {% with active=request.resolver_match.url_name %}
            <a href="{% url 'main:shop_home' %}"
               class="nav-item flex-1 flex flex-col items-center justify-center gap-1
                      {% if active == 'shop_home' %}text-blue-600{% else %}text-gray-400{% endif %}">
                <span class="{% if active == 'shop_home' %}nav-active-icon{% endif %} flex items-center justify-center">
                    <svg class="nav-bottom-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M4 6h2v2H4zM4 4h4v4H4zM16 4h4v4h-4zM16 6h2v2h-2zM4 16h2v2H4zM4 14h4v4H4z"/>
                        <rect x="10" y="10" width="4" height="4" rx="0.5" fill="currentColor" stroke="none"/>
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M14 10h2v2M20 14v2h-2M14 20h2v2M20 20h-2v-2"/>
                    </svg>
                </span>
                <span class="text-xs font-medium leading-none">Skaner</span>
            </a>

            <!-- Tarix -->
            <a href="{% url 'main:warranty_history' %}"
               class="nav-item flex-1 flex flex-col items-center justify-center gap-1
                      {% if active == 'warranty_history' %}text-blue-600{% else %}text-gray-400{% endif %}">
                <span class="{% if active == 'warranty_history' %}nav-active-icon{% endif %} flex items-center justify-center">
                    <svg class="nav-bottom-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </span>
                <span class="text-xs font-medium leading-none">Tarix</span>
            </a>

            <!-- Ombor -->
            <a href="{% url 'main:warehouse_list' %}"
               class="nav-item flex-1 flex flex-col items-center justify-center gap-1
                      {% if active == 'warehouse_list' %}text-blue-600{% else %}text-gray-400{% endif %}">
                <span class="{% if active == 'warehouse_list' %}nav-active-icon{% endif %} flex items-center justify-center">
                    <svg class="nav-bottom-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                </span>
                <span class="text-xs font-medium leading-none">Ombor</span>
            </a>

            <!-- Profil -->
            <a href="{% url 'main:shop_profile' %}"
               class="nav-item flex-1 flex flex-col items-center justify-center gap-1
                      {% if active == 'shop_profile' %}text-blue-600{% else %}text-gray-400{% endif %}">
                <span class="{% if active == 'shop_profile' %}nav-active-icon{% endif %} flex items-center justify-center">
                    <svg class="nav-bottom-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </span>
                <span class="text-xs font-medium leading-none">Profil</span>
            </a>
            {% endwith %}

        </div>
    </nav>

</div>

<script>
// Warranty preset pill selector
function selectWarrantyPreset(btn, inputId, labelId) {
    var days = parseInt(btn.dataset.days, 10);
    var today = new Date();
    today.setDate(today.getDate() + days);
    var dd = String(today.getDate()).padStart(2, '0');
    var mm = String(today.getMonth() + 1).padStart(2, '0');
    var yyyy = today.getFullYear();
    document.getElementById(inputId).value = dd + '/' + mm + '/' + yyyy;
    // highlight selected pill
    btn.closest('.flex').querySelectorAll('.warranty-preset').forEach(function(b) {
        b.classList.remove('bg-green-500', 'text-white', 'border-green-500');
        b.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
    });
    btn.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');
    btn.classList.add('bg-green-500', 'text-white', 'border-green-500');
    // show label
    var lbl = document.getElementById(labelId);
    if (lbl) { lbl.textContent = dd + '/' + mm + '/' + yyyy + ' gacha'; lbl.classList.remove('hidden'); }
}
</script>
<script>
(function() {
    // Date input mask: auto-fill slashes as DD/MM/YYYY
    function initDateMasks() {
        document.querySelectorAll('.date-input-mask').forEach(function(inp) {
            if (inp.dataset.dateMaskInit) return;
            inp.dataset.dateMaskInit = '1';
            inp.addEventListener('input', function() {
                var v = this.value.replace(/\D/g, '');
                if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
                if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5,9);
                this.value = v;
            });
        });
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDateMasks);
    } else {
        initDateMasks();
    }
})();
</script>
<script>
(function() {
    var tg = window.Telegram?.WebApp;
    var topBar = document.getElementById('topBar');

    function applyTopBarSafeArea() {
        if (!topBar || !tg) return;
        var safeTop = (tg.safeAreaInset?.top || 0);
        var contentTop = (tg.contentSafeAreaInset?.top || 0);
        var total = safeTop + contentTop;
        topBar.style.paddingTop = (16 + total) + 'px';
        topBar.style.top = '0';
    }

    if (tg) {
        tg.ready();
        tg.expand();
        /* Native “are you sure?” when user tries to close the Mini App (Telegram 7.7+) */
        if (typeof tg.enableClosingConfirmation === 'function') {
            tg.enableClosingConfirmation();
        }
        if (typeof tg.disableVerticalSwipes === 'function') {
            tg.disableVerticalSwipes();
        }
        if (typeof tg.requestFullscreen === 'function') {
            tg.requestFullscreen();
        }
        applyTopBarSafeArea();
        tg.onEvent('contentSafeAreaChanged', applyTopBarSafeArea);
        tg.onEvent('safeAreaChanged', applyTopBarSafeArea);
    }
})();
</script>
</body>
</html>
