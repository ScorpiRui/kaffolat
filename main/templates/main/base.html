<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Kaffolat{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
<div class="min-h-screen">
    <header class="bg-white shadow">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                {% if shop and shop.logo %}
                    <img src="{{ shop.logo.url }}" alt="{{ shop.name }}" class="w-10 h-10 rounded-full object-cover">
                {% endif %}
                <div>
                    <div class="font-semibold text-lg">
                        {% if shop %}{{ shop.name }}{% else %}Kaffolat{% endif %}
                    </div>
                </div>
            </div>
            <nav class="space-x-4 text-sm">
                <a href="{% url 'main:shop_home' %}" class="text-gray-700 hover:text-black">Bosh sahifa</a>
                <a href="{% url 'main:warehouse_list' %}" class="text-gray-700 hover:text-black">Ombor</a>
            </nav>
        </div>
    </header>
    <main class="max-w-4xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
